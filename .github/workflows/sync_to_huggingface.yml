name: Sync to Hugging Face hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Prepare Deployment Directory
        run: |
          # 1. Create a fresh, isolated directory
          mkdir deploy_space
          
          # 2. Copy the root-level deployment files
          cp app.py deploy_space/
          cp requirements.txt deploy_space/
          cp README.md deploy_space/
          
          # 3. Maintain the directory structure for your modular code
          mkdir -p deploy_space/src
          
          # Copying the specific folders needed for inference
          cp -r src/Deployment_predictions deploy_space/src/
          cp -r src/models deploy_space/src/

      - name: Push isolated files to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd deploy_space
          
          # Initialize a clean repository to stay under the 10MB/history limits
          git init
          git checkout -b main
          
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          
          git add .
          git commit -m "Deployment: Added app files and src/models"
          
          # Force push to the Space
          git push --force https://Aryan9797:$HF_TOKEN@huggingface.co/spaces/Aryan9797/mashup-genre-classifier main