name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true 
          
      - name: Prepare Production Build (Remove Notebooks)
        run: |
          # 1. Delete the heavy experimental folders and notebook files
          rm -rf notebooks/
          rm -f *.ipynb
          
          # 2. Configure a temporary Git identity on the runner
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action Deployment"
          
          # 3. Create a clean, lightweight commit just for Hugging Face
          git add -A
          git commit -m "Production build: stripped heavy notebooks" || echo "No changes"
          
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # Notice we changed 'main' to 'HEAD:main' at the end to push the new clean commit
        run: git push --force https://Aryan9797:$HF_TOKEN@huggingface.co/spaces/Aryan9797/mashup-genre-classifier HEAD:main
